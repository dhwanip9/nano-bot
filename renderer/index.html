<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>NanoBot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <!-- Speech bubble — content injected by nano.js -->
  <div id="bubble" class="bubble hidden">
    <div id="bubble-body"></div>
    <div id="bubble-tail" class="bubble-tail"></div>
  </div>

  <!-- Creature -->
  <div id="creature">
    <img id="nanobot" src="../assets/nanobot.png" class="idle" draggable="false" />
    <div id="nudge-dot"></div>
    <div id="status-dot"></div>
  </div>

</div>
<script src="nano.js"></script>
</body>
</html>
